services:
  - type: web
    name: studypulse-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && (cd ../frontend && npm install && npm run build) && npx tsc --project tsconfig.json
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        sync: false  # Must be set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
